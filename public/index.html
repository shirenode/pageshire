<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Merger</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PDF Merger</h1>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
    <p class="subtitle">Upload two or more PDF files, reorder them, and merge into one.</p>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drag &amp; drop PDF files here</p>
        <p class="hint">or click to browse</p>
      </div>
      <input type="file" id="fileInput" multiple accept="application/pdf" />
    </div>

    <div id="fileList" class="file-list hidden">
      <h3>Selected Files <span id="fileCount"></span></h3>
      <ul id="fileItems"></ul>
      <button type="button" id="clearBtn" class="btn btn-secondary">Clear All</button>
    </div>

    <div id="errorMsg" class="error hidden"></div>

    <button type="button" id="mergeBtn" class="btn btn-primary" disabled>
      Merge PDFs
    </button>

    <div id="spinner" class="spinner hidden">
      <div class="loader"></div>
      <p>Merging files…</p>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const fileItems = document.getElementById('fileItems');
    const fileCount = document.getElementById('fileCount');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const errorMsg = document.getElementById('errorMsg');
    const spinner = document.getElementById('spinner');

    let selectedFiles = [];
    let dragSrcIndex = null;

    // --- Drop zone events ---
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
    });

    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });

    clearBtn.addEventListener('click', () => {
      selectedFiles = [];
      renderFileList();
    });

    // --- File management ---
    function addFiles(files) {
      hideError();
      for (const file of files) {
        if (file.type !== 'application/pdf') {
          showError('Only PDF files are accepted. Skipped: ' + file.name);
          continue;
        }
        if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
          selectedFiles.push(file);
        }
      }
      renderFileList();
    }

    function renderFileList() {
      fileItems.innerHTML = '';

      if (selectedFiles.length === 0) {
        fileList.classList.add('hidden');
        mergeBtn.disabled = true;
        return;
      }

      fileList.classList.remove('hidden');
      fileCount.textContent = '(' + selectedFiles.length + ')';

      selectedFiles.forEach((file, idx) => {
        const li = document.createElement('li');
        li.draggable = true;
        li.dataset.index = idx;

        const grip = document.createElement('span');
        grip.className = 'grip';
        grip.textContent = '☰';

        const name = document.createElement('span');
        name.className = 'file-name';
        name.textContent = file.name + ' (' + formatSize(file.size) + ')';

        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.className = 'remove-btn';
        removeBtn.type = 'button';
        removeBtn.addEventListener('click', () => {
          selectedFiles.splice(idx, 1);
          renderFileList();
        });

        li.appendChild(grip);
        li.appendChild(name);
        li.appendChild(removeBtn);

        // Drag-to-reorder events
        li.addEventListener('dragstart', e => {
          dragSrcIndex = idx;
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        li.addEventListener('dragend', () => li.classList.remove('dragging'));
        li.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          li.classList.add('drag-target');
        });
        li.addEventListener('dragleave', () => li.classList.remove('drag-target'));
        li.addEventListener('drop', e => {
          e.preventDefault();
          e.stopPropagation();
          li.classList.remove('drag-target');
          if (dragSrcIndex !== null && dragSrcIndex !== idx) {
            const moved = selectedFiles.splice(dragSrcIndex, 1)[0];
            selectedFiles.splice(idx, 0, moved);
            renderFileList();
          }
          dragSrcIndex = null;
        });

        fileItems.appendChild(li);
      });

      mergeBtn.disabled = selectedFiles.length < 2;
    }

    // --- Merge ---
    mergeBtn.addEventListener('click', async () => {
      hideError();
      if (selectedFiles.length < 2) {
        showError('Please select at least 2 PDF files.');
        return;
      }

      const formData = new FormData();
      selectedFiles.forEach(file => formData.append('files', file));

      mergeBtn.disabled = true;
      spinner.classList.remove('hidden');

      try {
        const res = await fetch('/merge', { method: 'POST', body: formData });

        if (!res.ok) {
          const body = await res.json().catch(() => null);
          showError(body?.error || 'An error occurred while merging.');
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch {
        showError('Network error. Please try again.');
      } finally {
        mergeBtn.disabled = selectedFiles.length < 2;
        spinner.classList.add('hidden');
      }
    });

    // --- Helpers ---
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function hideError() {
      errorMsg.classList.add('hidden');
    }

    // --- Dark mode ---
    const themeToggle = document.getElementById('themeToggle');
    const storedTheme = localStorage.getItem('theme');
    if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
