apiVersion: v1
kind: Namespace
metadata:
  name: pageshire
---
apiVersion: v1
kind: Secret
metadata:
  name: pageshire-secrets
  namespace: pageshire
type: Opaque
stringData:
  SUPABASE_URL: "https://fhzirzdsfwsgovyypoig.supabase.co"
  SUPABASE_ANON_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pageshire-config
  namespace: pageshire
data:
  NODE_ENV: "production"
  PORT: "3000"
  FREE_MERGE_LIMIT: "2"
  USAGE_WINDOW_HOURS: "24"
  UPGRADE_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pageshire
  namespace: pageshire
  labels:
    app: pageshire
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: pageshire
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pageshire
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pageshire
          image: pageshire:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: pageshire-config
            - secretRef:
                name: pageshire-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pageshire
  namespace: pageshire
spec:
  type: ClusterIP
  selector:
    app: pageshire
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pageshire
  namespace: pageshire
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: pageshire.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pageshire
                port:
                  number: 80
  tls:
    - hosts:
        - pageshire.example.com
      secretName: pageshire-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pageshire
  namespace: pageshire
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pageshire
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
